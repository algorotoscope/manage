---
layout: page
width: expand
title: Algorotoscope - Manage
---

<div class="uk-container{{container}}">

    <style>
        .home-thumb {
            display: block;
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            background: #eee;
        }
    </style>

    <div class="uk-child-width-1-2@s uk-child-width-1-3@m uk-child-width-1-4@l uk-grid-match uk-text-center uk-margin-medium-top" data-uk-grid>
    {% assign collections = site.data.collections | sort: 'name' %}
    {% for c in collections %}
        <div>
            <div class="uk-card uk-card-default">
                <div class="uk-card-media-top">
                    <a href="/collections/{{ c.slug }}/"><img loading="lazy" decoding="async" class="home-thumb" src="{{ c.cover }}" alt="{{ c.name }}"></a>
                </div>
                <div class="uk-card-body uk-padding-small">
                    <h5 class="uk-margin-remove"><a href="/collections/{{ c.slug }}/">{{ c.name }}</a></h5>
                    <div class="uk-text-meta">{{ c.count }} images</div>
                </div>
            </div>
        </div>
    {% endfor %}
    </div>

    <h3>Commands</h3>
    <ul>
        <li><a href="/commands/pull-targets/">Pull Targets</a></li>
        <li><a href="/commands/apply-to-images/">Apply to Images</a></li>
        <li><a href="/commands/upload-applied-to-s3/">Upload Applied to S3</a></li>
    </ul>

</div>
